<body style="margin: 0; height: 95%;">
  <div id="dev_loading"
    style="margin: 0;height: 95vh;width: 100%;align-items: center;justify-content: center;display: flex;">
    <lottie-player src="loading.json" background="transparent" speed="0.5" style="width: 300px; height: 300px;" loop
      autoplay></lottie-player>
  </div>
  <a href="//www.dmca.com/Protection/Status.aspx?ID=9a80b2e0-bc91-4359-8abd-244e7fda0558"
    title="DMCA.com Protection Status" class="dmca-badge"> <img
      src="https://images.dmca.com/Badges/dmca_protected_sml_120l.png?ID=9a80b2e0-bc91-4359-8abd-244e7fda0558"
      alt="DMCA.com Protection Status" /></a>
  <script>
    const serviceWorkerVersion = '3003260149';
    window.onload = function () {
      window.serviceWorkerVersion = serviceWorkerVersion;
    }
    var currentUrl = window.location.href;
    if (!currentUrl.includes('localhost')) {
      document.addEventListener('contextmenu', event => event.preventDefault());

      document.addEventListener('mousedown', function (e) {
        if (e.button === 2) {
          e.preventDefault();
        }
        if (e.ctrlKey) {
          e.preventDefault();
        }
      });
      document.onkeydown = function (e) {
        if (e.keyCode == 123) {
          return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) {
          return false;
        }
        if (e.ctrlKey && e.keyCode == 85) {
          return false;
        }
        if (e.metaKey && e.altKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67 || e.keyCode == 85)) {
          return false;
        }
        if (e.metaKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) {
          return false;
        }
      };
      var script = document.createElement('script');
      script.src = 'f12.js' + (serviceWorkerVersion !== 'none' ? '?v=' + serviceWorkerVersion : '');
      script.defer = true;
      document.head.appendChild(script);
    }
    // Manual bootstrap for 512MB RAM (Flutter 3.41)
    window.addEventListener('load', function (ev) {
      _flutter.loader.load({
        entrypointUrl: 'main.dart.js' + (serviceWorkerVersion !== 'none' ? '?v=' + serviceWorkerVersion : ''),
        onEntrypointLoaded: async function (engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine({
            canvasKitMaximumMemoryInBytes: 536870912, // 512MB
          });
          await appRunner.runApp();
          document.getElementById('dev_loading')?.remove();
        }
      });
    });
  </script>

  <script>
    (function () {
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js' + (serviceWorkerVersion !== 'none' ? '?v=' + serviceWorkerVersion : '');
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
  <script src="https://images.dmca.com/Badges/DMCABadgeHelper.min.js"></script>
