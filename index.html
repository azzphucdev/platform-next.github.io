  <script>
    var BUILD_VERSION = '2704261654';

    (function () {
      if (BUILD_VERSION === '__BUILD_' + 'VERSION__') {
        return;
      }
      var cached = localStorage.getItem('app_version');
      if (cached && cached !== BUILD_VERSION) {
        localStorage.setItem('app_version', BUILD_VERSION);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            regs.forEach(function (r) { r.unregister(); });

        }
        if (window.caches) {
          caches.keys().then(function (names) {
            names.forEach(function (n) { caches.delete(n); });
          });
        }
        try { sessionStorage.clear(); } catch (e) { }
        setTimeout(function () {
          window.location.reload();
        }, 300);
        return;
      }
      localStorage.setItem('app_version', BUILD_VERSION);
    })();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) {
          console.log('Unregistering legacy service worker:', r.scope);
          r.unregister();
        });
      });
    }

    var currentUrl = window.location.href;
    if (!currentUrl.includes('localhost')) {
      document.addEventListener('contextmenu', event => event.preventDefault());

      document.addEventListener('mousedown', function (e) {
        if (e.button === 2) {
          e.preventDefault();
        }
        if (e.ctrlKey) {
          e.preventDefault();
        }
      });
      document.onkeydown = function (e) {
        if (e.keyCode == 123) {
          return false;
        }
        if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 67 || e.keyCode == 74)) {
          return false;

          return false;

      };
      var script = document.createElement('script');
      script.src = 'f12.js?v=' + BUILD_VERSION;
      script.defer = true;
      document.head.appendChild(script);
