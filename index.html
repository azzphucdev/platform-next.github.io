        <div
            id="dev_loading"

        <a
            href="//www.dmca.com/Protection/Status.aspx?ID=9a80b2e0-bc91-4359-8abd-244e7fda0558"
            title="DMCA.com Protection Status"
            class="dmca-badge"
        >
            <img
                src="https://images.dmca.com/Badges/dmca_protected_sml_120l.png?ID=9a80b2e0-bc91-4359-8abd-244e7fda0558"
                alt="DMCA.com Protection Status"
        /></a>

        <script>
            var BUILD_VERSION = "2906260348";

            (function () {
                if (BUILD_VERSION === "__BUILD_" + "VERSION__") {
                    return;
                }
                var cached = localStorage.getItem("app_version");
                if (cached && cached !== BUILD_VERSION) {
                    localStorage.setItem("app_version", BUILD_VERSION);
                    if ("serviceWorker" in navigator) {
                        navigator.serviceWorker
                            .getRegistrations()
                            .then(function (regs) {
                                regs.forEach(function (r) {
                                    r.unregister();
                                });
                            });
                    }
                    if (window.caches) {
                        caches.keys().then(function (names) {
                            names.forEach(function (n) {
                                caches.delete(n);
                            });
                        });
                    }
                    try {
                        sessionStorage.clear();
                    } catch (e) {}
                    setTimeout(function () {
                        window.location.reload();
                    }, 300);
                    return;
                }
                localStorage.setItem("app_version", BUILD_VERSION);
            })();

            if ("serviceWorker" in navigator) {
                navigator.serviceWorker
                    .getRegistrations()
                    .then(function (regs) {
                        regs.forEach(function (r) {
                            console.log(
                                "Unregistering legacy service worker:",
                                r.scope,
                            );
                            r.unregister();
                        });
                    });
            }

            var currentUrl = window.location.href;
            if (!currentUrl.includes("localhost")) {
                document.addEventListener("contextmenu", (event) =>
                    event.preventDefault(),
                );
                document.addEventListener("mousedown", function (e) {
                    if (e.button === 2 || e.ctrlKey) {
                        e.preventDefault();
                    }
                });

                window.addEventListener(
                    "keydown",
                    function (e) {
                        var k = e.keyCode;
                        // F12
                        if (k === 123) {
                            e.preventDefault();
                            return;
                        }
                        // Ctrl+Shift+I / Cmd+Shift+I  (DevTools)
                        if (
                            (e.ctrlKey || e.metaKey) &&
                            e.shiftKey &&
                            (k === 73 || k === 67 || k === 74)
                        ) {
                            e.preventDefault();
                            return;
                        }
                        // Ctrl+U / Cmd+U  (View Source)
                        if ((e.ctrlKey || e.metaKey) && k === 85) {
                            e.preventDefault();
                            return;
                        }
                        // Ctrl+S / Cmd+S  (Save Page)
                        if ((e.ctrlKey || e.metaKey) && k === 83) {
                            e.preventDefault();
                            return;
                        }
                        // Ctrl+P / Cmd+P  (Print)
                        if ((e.ctrlKey || e.metaKey) && k === 80) {
                            e.preventDefault();
                            return;
                        }
                        // Cmd+Alt+I / Cmd+Alt+J  (Mac DevTools)
                        if (
                            e.metaKey &&
                            e.altKey &&
                            (k === 73 || k === 74 || k === 67 || k === 85)
                        ) {
                            e.preventDefault();
                            return;
                        }
                    },
                    { capture: true },
                );

                (function () {
                    var devtoolsConfirmed = false;
                    var devtoolsSuspected = false;
                    var blockPage = function () {
                        if (devtoolsConfirmed) return;
                        devtoolsConfirmed = true;
                        document.body.innerHTML =
                            '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#fff;background:#1a1a2e;text-align:center"><div><h1>Developer Tools Detected</h1><p>Please close Developer Tools to continue.</p></div></div>';
                    };
                    setInterval(function () {
                        var start = performance.now();
                        debugger;
                        var end = performance.now();
                        if (end - start > 160) {
                            devtoolsSuspected = true;
                            blockPage();
                        }
                    }, 1000);

                    window.addEventListener("resize", function () {
                        if (!devtoolsSuspected) return;
                        if (
                            window.outerWidth - window.innerWidth > 300 ||
                            window.outerHeight - window.innerHeight > 300
                        ) {
                            blockPage();
                        }
                    });
                })();
                document.addEventListener("dragstart", function (e) {
                    e.preventDefault();
                });
                var f12Script = document.createElement("script");
                f12Script.src = "f12.js?v=" + BUILD_VERSION;
                f12Script.defer = true;
                document.head.appendChild(f12Script);
            }

            var flutterScript = document.createElement("script");
            flutterScript.src = "flutter_bootstrap.js?v=" + BUILD_VERSION;
            flutterScript.async = true;
            document.head.appendChild(flutterScript);
        </script>

        <script src="https://images.dmca.com/Badges/DMCABadgeHelper.min.js"></script>
    </body>
